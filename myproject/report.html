<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report Lost Pet - NeoPaws</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="report-body">

<nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-nav">
    <div class="container">
        <a class="navbar-brand fw-bold glow-text" href="index.html">🐾 NeoPaws</a>
        <div class="ms-auto">
            <a href="lostfound.html" class="btn btn-glow">BACK</a>
        </div>
    </div>
</nav>

<section class="report-hero d-flex align-items-center text-center text-white">
    <div class="container">
        <h1 class="display-5 fw-bold glow-text">Report a Missing Companion</h1>
        <p class="lead mt-3">Provide details below. Our AI system will begin scanning immediately.</p>
    </div>
</section>

<section class="py-5">
<div class="container">
<div class="glass-section p-5 text-white">

<form id="reportForm" class="row g-4">

<h4 class="project-title">Owner Information</h4>

<div class="col-md-6">
    <label class="form-label">Full Name</label>
    <input type="text" id="ownerName" class="form-control futuristic-input" placeholder="Your full name" required>
</div>

<div class="col-md-6">
    <label class="form-label">Phone Number</label>
    <input type="tel" id="phone" class="form-control futuristic-input" placeholder="10-digit mobile number" required>
</div>

<div class="col-md-6">
    <label class="form-label">Email Address</label>
    <input type="email" id="email" class="form-control futuristic-input" placeholder="example@email.com" required>
</div>

<div class="col-md-6">
    <label class="form-label">City</label>
    <input type="text" id="city" class="form-control futuristic-input" placeholder="Your city">
</div>

<hr class="mt-4">

<h4 class="project-title">Pet Information</h4>

<div class="col-md-4">
    <label class="form-label">Pet Type</label>
    <select id="petType" class="form-select futuristic-input">
        <option value="dog">Dog</option>
        <option value="cat">Cat</option>
        <option value="rabbit">Rabbit</option>
        <option value="hamster">Hamster</option>
        <option value="bird">Bird</option>
        <option value="other">Other</option>
    </select>
</div>

<div class="col-md-4">
    <label class="form-label">Breed</label>
    <input type="text" id="breed" class="form-control futuristic-input" placeholder="e.g. Labrador, Persian">
</div>

<div class="col-md-4">
    <label class="form-label">Age (years)</label>
    <input type="number" id="petAge" class="form-control futuristic-input" min="0" max="30" placeholder="0–30">
</div>

<div class="col-md-6">
    <label class="form-label">Color / Identifying Marks <small class="text-muted">(min. 5 characters)</small></label>
    <input type="text" id="colorMarks" class="form-control futuristic-input" placeholder="e.g. Brown with white patch on chest">
</div>

<div class="col-md-6">
    <label class="form-label">Microchipped?</label>
    <select id="microchipped" class="form-select futuristic-input">
        <option value="yes">Yes</option>
        <option value="no">No</option>
        <option value="unsure">Not Sure</option>
    </select>
</div>

<div class="col-md-6">
    <label class="form-label">Last Seen Location <small class="text-muted">(min. 5 characters)</small></label>
    <input type="text" id="lastSeen" class="form-control futuristic-input" placeholder="Street, area, landmark...">
</div>

<div class="col-md-6">
    <label class="form-label">Date Missing</label>
    <input type="date" id="dateMissing" class="form-control futuristic-input">
</div>

<div class="col-12">
    <label class="form-label">Additional Details <small class="text-muted">(min. 20 characters)</small></label>
    <textarea id="additionalDetails" rows="4" class="form-control futuristic-input" placeholder="Any additional details that may help locate your pet..."></textarea>
</div>

<div class="col-12">
    <label class="form-label">Upload Pet Image <small class="text-muted">(JPG, PNG, GIF or WEBP, max 5MB)</small></label>
    <input type="file" id="petImage" class="form-control futuristic-input" accept=".jpg,.jpeg,.png,.gif,.webp">
</div>

<div class="col-12 form-check mt-3">
    <input class="form-check-input" type="checkbox" id="confirmInfo" required>
    <label class="form-check-label" for="confirmInfo">
        I confirm that the information provided is accurate.
    </label>
</div>

<div class="col-12 mt-4">
    <button type="submit" class="btn btn-glow w-100 btn-lg">Submit Report</button>
</div>

</form>
</div>
</div>
</section>

<footer class="footer text-center py-4">
    <p class="mb-0">© 2026 NeoPaws. All Rights Reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>
<script src="report.js"></script>
</body>
</html>
