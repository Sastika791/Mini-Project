<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Become a Volunteer - NeoPaws</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="volunteer-body">

<nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-nav">
    <div class="container">
        <a class="navbar-brand fw-bold glow-text" href="index.html">🐾 NeoPaws</a>
        <div class="ms-auto">
            <a href="lostfound.html" class="btn btn-glow">BACK</a>
        </div>
    </div>
</nav>

<section class="volunteer-hero d-flex align-items-center text-center text-white">
    <div class="container">
        <h1 class="display-5 fw-bold glow-text">Join the Rescue Network</h1>
        <p class="lead mt-3">Be the reason a lost pet finds its way home.</p>
    </div>
</section>

<section class="py-5">
<div class="container">
<div class="glass-section p-5 text-white">

<form id="volunteerForm" class="row g-4">

<h4 class="project-title">Personal Information</h4>

<div class="col-md-6">
    <label class="form-label">Full Name</label>
    <input type="text" id="fullName" class="form-control futuristic-input" placeholder="Enter your full name" required>
</div>

<div class="col-md-6">
    <label class="form-label">Phone Number</label>
    <input type="tel" id="phone" class="form-control futuristic-input" placeholder="10-digit mobile number" required>
</div>

<div class="col-md-6">
    <label class="form-label">Email Address</label>
    <input type="email" id="email" class="form-control futuristic-input" placeholder="example@email.com" required>
</div>

<div class="col-md-6">
    <label class="form-label">City</label>
    <input type="text" id="city" class="form-control futuristic-input" placeholder="Your city">
</div>

<div class="col-md-6">
    <label class="form-label">Date of Birth <small class="text-muted">(Must be 18–65)</small></label>
    <input type="date" id="dob" class="form-control futuristic-input">
</div>

<div class="col-md-6">
    <label class="form-label">Occupation</label>
    <input type="text" id="occupation" class="form-control futuristic-input" placeholder="Your occupation">
</div>

<hr class="mt-4">

<h4 class="project-title">Volunteer Preferences</h4>

<div class="col-md-6">
    <label class="form-label">Preferred Role</label>
    <select id="role" class="form-select futuristic-input">
        <option value="">-- Select a Role --</option>
        <option value="search">Search &amp; Field Rescue</option>
        <option value="online">Online Monitoring</option>
        <option value="verify">Verification &amp; Screening</option>
        <option value="awareness">Community Awareness</option>
        <option value="transport">Transport Assistance</option>
    </select>
</div>

<div class="col-md-6">
    <label class="form-label">Availability</label>
    <select id="availability" class="form-select futuristic-input">
        <option value="">-- Select Availability --</option>
        <option value="weekdays">Weekdays</option>
        <option value="weekends">Weekends</option>
        <option value="evenings">Evenings</option>
        <option value="fulltime">Full Time</option>
    </select>
</div>

<div class="col-12">
    <label class="form-label">Why Do You Want to Volunteer? <small class="text-muted">(min. 30 characters)</small></label>
    <textarea id="whyVolunteer" rows="4" class="form-control futuristic-input" placeholder="Tell us why you'd like to volunteer with NeoPaws..."></textarea>
</div>

<div class="col-12">
    <label class="form-label">Upload ID Proof <small class="text-muted">(JPG, PNG or PDF, max 5MB)</small></label>
    <input type="file" id="idProof" class="form-control futuristic-input" accept=".jpg,.jpeg,.png,.pdf">
</div>

<div class="col-12 form-check mt-3">
    <input class="form-check-input" type="checkbox" id="terms" required>
    <label class="form-check-label" for="terms">
        I agree to follow NeoPaws volunteer guidelines.
    </label>
</div>

<div class="col-12 mt-4">
    <button type="submit" class="btn btn-glow w-100 btn-lg">Submit Application</button>
</div>

</form>
</div>
</div>
</section>

<footer class="footer text-center py-4">
    <p class="mb-0">© 2026 NeoPaws. All Rights Reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>
<script src="volunteer.js"></script>
</body>
</html>
