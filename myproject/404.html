<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 – Page Not Found | NeoPaws</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .error-body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .error-code {
    font-size: clamp(6rem, 18vw, 12rem);
    font-weight: 800;
    color: transparent;
    -webkit-text-stroke: 3px #00f5ff;
    text-shadow: 0 0 40px rgba(0,245,255,0.4);
    line-height: 1;
    user-select: none;
  }
  .paw-float {
    font-size: 3rem;
    animation: floatPaw 3s ease-in-out infinite alternate;
    display: inline-block;
  }
  @keyframes floatPaw {
    from { transform: translateY(0) rotate(-5deg); }
    to   { transform: translateY(-18px) rotate(5deg); }
  }
  .error-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0,245,255,0.25);
    border-radius: 24px;
    padding: 3rem 2.5rem;
    text-align: center;
    max-width: 560px;
    width: 90%;
    color: white;
    box-shadow: 0 0 60px rgba(0,245,255,0.1);
    position: relative;
    z-index: 1;
  }
  .blob { pointer-events: none; }
</style>
</head>
<body class="error-body">

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="error-card">
    <div class="paw-float mb-2">🐾</div>
    <div class="error-code">404</div>
    <h2 class="fw-bold mt-2 glow-text">Oops! Lost in the shelter.</h2>
    <p class="mt-3 text-white-50">
        Looks like this page wandered off. Don't worry — we'll help you
        find your way back to the pack.
    </p>
    <div class="mt-4 d-flex justify-content-center gap-3 flex-wrap">
        <a href="index.html" class="btn btn-glow px-4 py-2">🏠 Go Home</a>
        <a href="explore.html" class="btn btn-outline-light px-4 py-2">🐶 Explore Pets</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>
</body>
</html>
